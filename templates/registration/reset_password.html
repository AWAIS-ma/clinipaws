{% extends 'base.html' %}

{% block content %}
<style>
    .auth-container {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--main-bg);
    }

    .auth-card {
        background: #FFFFFF;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        border: 1px solid var(--border-color);
        max-width: 450px;
        width: 100%;
    }

    .auth-icon-wrapper {
        text-align: center;
        padding: 2rem 2rem 1rem;
        background: var(--main-bg);
    }

    .auth-icon {
        width: 70px;
        height: 70px;
        background: var(--primary-color);
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .auth-icon i {
        font-size: 1.75rem;
        color: #FFFFFF;
    }

    .auth-title {
        text-align: center;
        padding: 1rem 2rem;
        background: #FFFFFF;
    }

    .auth-title h3 {
        color: var(--text-primary);
        font-weight: 700;
        margin-bottom: 0.5rem;
    }

    .auth-title p {
        color: var(--text-secondary);
        margin: 0;
        font-size: 0.875rem;
    }

    .auth-body {
        padding: 2rem;
        background: #FFFFFF;
    }

    .auth-body .form-control,
    .auth-body .form-select {
        background: #FFFFFF !important;
        border: 1px solid var(--border-color) !important;
        color: var(--text-primary) !important;
        padding: 0.75rem 1rem;
        border-radius: 6px;
    }

    .auth-body .form-control:focus,
    .auth-body .form-select:focus {
        background: #FFFFFF !important;
        border-color: var(--primary-color) !important;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1) !important;
        color: var(--text-primary) !important;
    }

    .auth-body label {
        color: var(--text-primary);
        font-weight: 600;
        margin-bottom: 0.5rem;
        display: block;
        font-size: 0.875rem;
    }

    .auth-body .helptext {
        color: var(--text-secondary);
        font-size: 0.875rem;
        margin-top: 0.5rem;
        display: block;
        background: var(--main-bg);
        border-left: 3px solid var(--primary-color);
        padding: 0.75rem;
        border-radius: 4px;
    }

    .auth-body .helptext ul {
        margin: 0;
        padding-left: 1.25rem;
    }

    .auth-body .errorlist {
        color: #dc2626;
        font-size: 0.875rem;
        list-style: none;
        padding: 0;
        margin: 0.25rem 0 0 0;
    }

    .btn-auth {
        background: var(--primary-color);
        border: none;
        color: #FFFFFF;
        font-weight: 600;
        padding: 0.75rem;
        border-radius: 6px;
    }

    .btn-auth:hover {
        background: var(--primary-hover);
        color: #FFFFFF;
    }

    .alert {
        background: #fee2e2;
        border: 1px solid #fecaca;
        border-left: 4px solid #dc2626;
        color: #991b1b;
        border-radius: 6px;
        padding: 1rem;
    }
</style>

<div class="auth-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-5">
                <div class="auth-card">
                    <div class="auth-icon-wrapper">
                        <div class="auth-icon">
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <div class="auth-title">
                        <h3>Reset Password</h3>
                        <p>Enter your new password below</p>
                    </div>

                    <div class="auth-body">
                        <form method="post">
                            {% csrf_token %}

                            {% if form.errors %}
                            <div class="alert mb-3">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                <strong>Please correct the errors below</strong>
                            </div>
                            {% endif %}

                            {{ form.as_p }}

                            <div class="d-grid gap-2 mt-3">
                                <button type="submit" class="btn btn-auth">
                                    <i class="fas fa-save me-2"></i>Reset Password
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

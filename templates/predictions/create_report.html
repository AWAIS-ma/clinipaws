{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Create Disease Prediction Report</h5>
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-end mb-3">
                    <a href="{% url 'check_by_image' %}" class="btn btn-outline-info">
                        <i class="fas fa-camera"></i> Check by Image
                    </a>
                </div>
                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label for="id_animal" class="form-label">Select Animal</label>
                        {{ form.animal }}
                    </div>

                    <div class="mb-3">
                        <label for="id_symptom1" class="form-label">Symptom 1</label>
                        {{ form.symptom1 }}
                    </div>

                    <div class="mb-3">
                        <label for="id_symptom2" class="form-label">Symptom 2</label>
                        {{ form.symptom2 }}
                    </div>

                    <div class="mb-3">
                        <label for="id_symptom3" class="form-label">Symptom 3</label>
                        {{ form.symptom3 }}
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Check the Disease</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
